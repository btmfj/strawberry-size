<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ボタン強制表示テスト</title>
    <style>
        /* 背景をわざと真っ黒にして、更新されたか一目でわかるようにします */
        body { background-color: black !important; color: white; text-align: center; }
        .my-button { 
            display: block !important; 
            visibility: visible !important;
            width: 90%; 
            height: 100px; /* ボタンを巨大に */
            margin: 20px auto; 
            font-size: 30px;
            font-weight: bold;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <h1>画面が黒ければ更新成功です</h1>
    
    <button id="connectBtn" class="my-button" style="background-color: #28a745 !important;">1. 接続する</button>
    
    <button id="tareBtn" class="my-button" style="background-color: #ff8c00 !important;">2. オレンジ色のボタン</button>

    <div id="weight" style="font-size: 50px;">0.0 g</div>

    <script>
        // JavaScriptの内容は同じ（中略）
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
        let bluetoothChar = null;
        document.getElementById('connectBtn').onclick = async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'ESP32_Strawberry_Scale' }],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bluetoothChar = await service.getCharacteristic(CHARACTERISTIC_UUID);
                alert("接続成功！");
                bluetoothChar.startNotifications();
                bluetoothChar.oncharacteristicvaluechanged = (e) => {
                    const val = new TextDecoder().decode(e.target.value);
                    document.getElementById('weight').innerText = parseFloat(val).toFixed(1) + " g";
                };
            } catch (err) { alert(err); }
        };
        document.getElementById('tareBtn').onclick = async () => {
            if (bluetoothChar) {
                const data = new Uint8Array([0x31]);
                await bluetoothChar.writeValue(data);
            } else { alert("先に接続してください"); }
        };
    </script>
</body>
</html>
