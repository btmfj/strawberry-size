<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イチゴ選別システム V1.21</title>
    <style>
        body { 
            background-color: #000; color: #fff; text-align: center; 
            font-family: -apple-system, sans-serif; padding: 10px; overflow: hidden; 
        }
        #status { color: #888; font-size: 14px; margin-top: 5px; }
        #weight { font-size: 110px; font-weight: bold; color: #00ff00; margin: 5px 0; line-height: 1.1; }
        #weight span { font-size: 30px; margin-left: 5px; }
        #size-display { font-size: 70px; font-weight: bold; color: #ffeb3b; margin-bottom: 20px; height: 80px; }
        
        .btn-container { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .my-button { 
            display: block; width: 90%; max-width: 400px; height: 85px; 
            font-size: 24px; font-weight: bold; border-radius: 20px; border: none; color: white;
        }
        #connectBtn { background-color: #28a745; }
        #tareBtn { background-color: #ff8c00; }
        
        .info-table { margin: 15px auto; font-size: 12px; color: #aaa; border-collapse: collapse; }
        .info-table td { border: 1px solid #333; padding: 4px 8px; }
    </style>
</head>
<body>
    <div id="status">Bluetooth未接続</div>
    <div id="weight">0.0<span>g</span></div>
    <div id="size-display">---</div>
    
    <div class="btn-container">
        <button id="connectBtn" class="my-button">① 接続して開始</button>
        <button id="tareBtn" class="my-button">② 0gセット (風袋)</button>
    </div>

    <table class="info-table">
        <tr><td>S: 7.0~</td><td>M: 10.0~</td><td>L: 12.0~</td><td>2L: 15.5~</td></tr>
    </table>

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
        
        // --- 音声ファイルの設定 ---
        // GitHubのリポジトリ構造に合わせてここを変更してください
        const AUDIO_BASE_URL = "strawberry-size/"; 
        const sounds = {
            "2L": new Audio(AUDIO_BASE_URL + "2l.mp3"),
            "L":  new Audio(AUDIO_BASE_URL + "l.mp3"),
            "M":  new Audio(AUDIO_BASE_URL + "m.mp3"),
            "S":  new Audio(AUDIO_BASE_URL + "s.mp3")
        };

        let bluetoothChar = null;
        let lastAnnouncedWeight = 0;

        // 接続処理
        document.getElementById('connectBtn').onclick = async () => {
            try {
                // iPhone対策: ユーザー操作時にすべての音声を一度「ロード」して再生許可を得る
                Object.values(sounds).forEach(s => { s.load(); });

                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'ESP32_Strawberry_Scale' }],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bluetoothChar = await service.getCharacteristic(CHARACTERISTIC_UUID);
                
                await bluetoothChar.startNotifications();
                document.getElementById('status').innerText = "✅ 接続中";
                document.getElementById('status').style.color = "#28a745";

                bluetoothChar.addEventListener('characteristicvaluechanged', (e) => {
                    const val = new TextDecoder().decode(e.target.value);
                    const weight = parseFloat(val);
                    updateDisplay(weight);
                });

            } catch (err) { alert("エラー: " + err); }
        };

        function updateDisplay(w) {
            document.getElementById('weight').innerHTML = `${w.toFixed(1)}<span>g</span>`;
            
            if (w < 5.0) {
                lastAnnouncedWeight = 0;
                document.getElementById('size-display').innerText = "---";
                return;
            }

            if (Math.abs(w - lastAnnouncedWeight) > 3.0) {
                playSizeAudio(w);
                lastAnnouncedWeight = w;
            }
        }

        function playSizeAudio(w) {
            let rounded = Math.round(w * 10) / 10;
            let sizeKey = "";
            let color = "#fff";

            if (rounded >= 15.5) { sizeKey = "2L"; color = "#ff4757"; }
            else if (rounded >= 12.0) { sizeKey = "L"; color = "#ffa502"; }
            else if (rounded >= 10.0) { sizeKey = "M"; color = "#2ed573"; }
            else if (rounded >= 7.0)  { sizeKey = "S"; color = "#1e90ff"; }

            if (sizeKey) {
                document.getElementById('size-display').innerText = sizeKey + " サイズ";
                document.getElementById('size-display').style.color = color;

                // MP3再生
                const audio = sounds[sizeKey];
                audio.currentTime = 0; // 最初から再生
                audio.play().catch(e => console.log("Audio Play Error:", e));
            }
        }

        document.getElementById('tareBtn').onclick = async () => {
            if (bluetoothChar) {
                await bluetoothChar.writeValue(new Uint8Array([0x31]));
            }
        };
    </script>
</body>
</html>
