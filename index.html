<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>はよ選果 V1.38</title>
    <style>
        body { background-color: #000; color: #fff; text-align: center; font-family: sans-serif; padding: 10px; overflow: hidden; }
        #status { color: #888; font-size: 14px; margin-bottom: 5px; }
        #weight { font-size: 80px; font-weight: bold; color: #00ff00; margin: 5px 0; }
        #weight span { font-size: 24px; }
        #diff-display { font-size: 30px; color: #ff4757; height: 35px; }
        #flash-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; align-items: center; justify-content: center; z-index: 100; font-size: 140px; font-weight: bold; }
        .btn-container { position: relative; z-index: 10; }
        .my-button { width: 95%; max-width: 400px; height: 85px; font-size: 24px; font-weight: bold; border-radius: 20px; border: none; color: white; margin: 10px 0; }
        #connectBtn { background-color: #28a745; box-shadow: 0 4px #1e7e34; }
        #tareBtn { background-color: #ff8c00; box-shadow: 0 4px #d97700; }
        #wake-lock-video { position: absolute; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
    </style>
</head>
<body>
    <video id="wake-lock-video" playsinline loop muted></video>
    <div id="flash-overlay"></div>
    <div id="status">Bluetooth未接続</div>
    <div id="weight">0.0<span>g</span></div>
    <div id="diff-display">--.- g 減</div>
    <div class="btn-container">
        <button id="connectBtn" class="my-button">① 接続・開始（スリープ防止）</button>
        <button id="tareBtn" class="my-button">② 基準リセット</button>
    </div>

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
        
        const sounds = {};
        const audioFiles = {
            "START": "start.mp3", "SD": "sd.mp3", "SS": "ss.mp3", "MD": "md.mp3", "MS": "ms.mp3",
            "LD": "ld.mp3", "LS": "ls.mp3", "2LD": "2ld.mp3", "2LS": "2ls.mp3",
            "12": "12.mp3", "11": "11.mp3", "10": "10.mp3", "9": "9.mp3",
            "8": "8.mp3", "7": "7.mp3", "6": "6.mp3", "5": "5.mp3", "4": "4.mp3", "3": "3.mp3"
        };
        
        Object.keys(audioFiles).forEach(key => {
            sounds[key] = new Audio("./" + audioFiles[key]);
            sounds[key].load();
        });

        let bluetoothChar = null;
        let currentWeight = 0;
        let stableWeight = 0;
        let weightHistory = [];
        let wakeLock = null;

        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
            }
            const video = document.getElementById('wake-lock-video');
            video.src = "data:video/mp4;base64,AAAAHGZ0eXBtcDQyAAAAAG1wNDJpc29tYXZjMQAAAZptb292AAAAbG12aGQAAAAA389pS9/PaUvAAABkAAACWwABAAABAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAACAAAAGGlvZHMAAAAAEAAf7v8AAQAAbWFpbg==";
            video.play();
        }

        document.getElementById('connectBtn').onclick = async () => {
            try {
                sounds["START"].play();
                requestWakeLock();

                const device = await navigator.bluetooth.requestDevice({
                    // ここを修正：はよ選果で始まる名前を許可
                    filters: [
                        { namePrefix: 'はよ選果' },
                        { namePrefix: 'ESP32_Strawberry_Scale' }
                    ],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bluetoothChar = await service.getCharacteristic(CHARACTERISTIC_UUID);
                await bluetoothChar.startNotifications();
                document.getElementById('status').innerText = "✅ 稼働中";
                bluetoothChar.addEventListener('characteristicvaluechanged', (e) => {
                    const val = new TextDecoder().decode(e.target.value);
                    processWeight(parseFloat(val));
                });
            } catch (err) { alert("Error: " + err); }
        };

        function processWeight(w) {
            currentWeight = w;
            document.getElementById('weight').innerHTML = `${w.toFixed(1)}<span>g</span>`;
            weightHistory.push(w);
            if (weightHistory.length > 3) weightHistory.shift();
            if (weightHistory.length === 3) {
                const maxW = Math.max(...weightHistory);
                const minW = Math.min(...weightHistory);
                if (maxW - minW < 0.2) {
                    if (Math.abs(stableWeight - w) > 0.5) { 
                        if (stableWeight > w) checkDifference(stableWeight, w);
                        stableWeight = w;
                    }
                }
            }
        }

        function checkDifference(oldW, newW) {
            const diff = oldW - newW;
            if (diff < 5.0) return;
            document.getElementById('diff-display').innerText = diff.toFixed(1) + " g 減";
            let label = ""; let bgColor = ""; let textColor = "#fff"; let audioKey = "";

            if (diff >= 25.35) { 
                label = getTamaNumPink(diff); bgColor = "#ff69b4"; audioKey = label;
            } else if (diff >= 20.9) { 
                label = getTamaNumGreen(diff); bgColor = "#008000"; audioKey = label;
            } else if (diff >= 19.25) { 
                label = "12"; bgColor = "#ffff00"; textColor = "#000"; audioKey = "12";
            } else if (diff >= 15.25) { 
                if (diff >= 17.8) { label = "2L大"; audioKey = "2LD"; } else { label = "2L小"; audioKey = "2LS"; }
                bgColor = "#ff0000";
            } else if (diff >= 11.75) { 
                if (diff >= 13.7) { label = "L大"; audioKey = "LD"; } else { label = "L小"; audioKey = "LS"; }
                bgColor = "#0000ff";
            } else if (diff >= 9.5) { 
                if (diff >= 10.65) { label = "M大"; audioKey = "MD"; } else { label = "M小"; audioKey = "MS"; }
                bgColor = "#ff0000";
            } else if (diff >= 7.0) {  
                if (diff >= 8.15) { label = "S大"; audioKey = "SD"; } else { label = "S小"; audioKey = "SS"; }
                bgColor = "#0000ff";
            }

            if (label) {
                showFlash(label, bgColor, textColor);
                if(sounds[audioKey]) {
                    sounds[audioKey].currentTime = 0;
                    sounds[audioKey].play();
                }
            }
        }

        function getTamaNumPink(d) {
            if (d >= 70.0) return "3"; if (d >= 54.0) return "4"; if (d >= 44.0) return "5";
            if (d >= 37.0) return "6"; if (d >= 32.15) return "7"; if (d >= 28.35) return "8";
            return "9";
        }

        function getTamaNumGreen(d) {
            if (d >= 22.9) return "10"; return "11";
        }

        function showFlash(text, color, tColor) {
            const overlay = document.getElementById('flash-overlay');
            overlay.innerText = text; overlay.style.backgroundColor = color;
            overlay.style.color = tColor; overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.display = 'none'; }, 1100);
        }

        document.getElementById('tareBtn').onclick = () => {
            stableWeight = currentWeight;
            document.getElementById('diff-display').innerText = "基準リセット";
        };

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        });
    </script>
</body>
</html>
