<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イチゴ選別システム V1.25</title>
    <style>
        body { background-color: #000; color: #fff; text-align: center; font-family: sans-serif; padding: 10px; }
        #status { color: #888; font-size: 14px; margin-bottom: 5px; }
        #weight { font-size: 100px; font-weight: bold; color: #00ff00; margin: 10px 0; line-height: 1.1; }
        #weight span { font-size: 30px; margin-left: 5px; }
        #diff-display { font-size: 35px; color: #ff4757; height: 40px; margin-top: 5px; }
        #size-display { font-size: 75px; font-weight: bold; color: #ffeb3b; height: 90px; margin-top: 10px; }
        .my-button { width: 95%; max-width: 400px; height: 85px; font-size: 24px; font-weight: bold; border-radius: 20px; border: none; color: white; margin: 10px 0; }
        #connectBtn { background-color: #28a745; box-shadow: 0 4px #1e7e34; }
        #tareBtn { background-color: #ff8c00; box-shadow: 0 4px #d97700; }
        #audio-debug { color: #ff4757; font-size: 14px; min-height: 20px; }
    </style>
</head>
<body>
    <div id="status">Bluetooth未接続</div>
    <div id="audio-debug"></div>
    <div id="weight">0.0<span>g</span></div>
    <div id="diff-display">--.- g 減</div>
    <div id="size-display">---</div>
    
    <button id="connectBtn" class="my-button">① 接続・音声開始</button>
    <button id="tareBtn" class="my-button">② 基準リセット</button>

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
        
        // --- 音声ファイル読み込み ---
        const sounds = {};
        const fileNames = ["2l", "l", "m", "s"];
        
        fileNames.forEach(name => {
            const key = name.toUpperCase();
            // パスをカレントディレクトリ直下に修正
            sounds[key] = new Audio("./" + name + ".mp3");
            sounds[key].load();
            sounds[key].onerror = () => {
                document.getElementById('audio-debug').innerText = `エラー: ${name}.mp3 が見つかりません`;
            };
        });

        let bluetoothChar = null;
        let currentWeight = 0;
        let stableWeight = 0;
        let weightHistory = [];

        document.getElementById('connectBtn').onclick = async () => {
            try {
                // iPhoneの音声再生制限を解除
                for (let key in sounds) {
                    const a = sounds[key];
                    a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(() => {});
                }

                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'ESP32_Strawberry_Scale' }],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bluetoothChar = await service.getCharacteristic(CHARACTERISTIC_UUID);
                await bluetoothChar.startNotifications();
                
                document.getElementById('status').innerText = "✅ 接続中";
                document.getElementById('audio-debug').innerText = "音声OK";
                document.getElementById('audio-debug').style.color = "#28a745";

                bluetoothChar.addEventListener('characteristicvaluechanged', (e) => {
                    const val = new TextDecoder().decode(e.target.value);
                    processWeight(parseFloat(val));
                });
            } catch (err) { alert("Bluetooth接続エラー: " + err); }
        };

        function processWeight(w) {
            currentWeight = w;
            document.getElementById('weight').innerHTML = `${w.toFixed(1)}<span>g</span>`;

            weightHistory.push(w);
            if (weightHistory.length > 5) weightHistory.shift(); // 安定判定をより慎重に（約1.5秒）

            if (weightHistory.length >= 3) {
                const maxW = Math.max(...weightHistory);
                const minW = Math.min(...weightHistory);
                
                // 数値が安定（変動0.2g以内）
                if (maxW - minW < 0.2) {
                    if (Math.abs(stableWeight - w) > 0.5) { 
                        if (stableWeight > w) { // 減少（引き抜き）を検知
                            checkDifference(stableWeight, w);
                        }
                        stableWeight = w;
                    }
                }
            }
        }

        function checkDifference(oldW, newW) {
            const diff = oldW - newW;
            if (diff < 5.0) return;

            document.getElementById('diff-display').innerText = diff.toFixed(1) + " g 減";
            
            let sizeKey = "";
            let color = "#fff";

            // 判定基準
            if (diff >= 15.5) { sizeKey = "2L"; color = "#ff4757"; }
            else if (diff >= 12.0) { sizeKey = "L"; color = "#ffa502"; }
            else if (diff >= 10.0) { sizeKey = "M"; color = "#2ed573"; }
            else if (diff >= 7.0)  { sizeKey = "S"; color = "#1e90ff"; }

            if (sizeKey && sounds[sizeKey]) {
                document.getElementById('size-display').innerText = sizeKey + " サイズ";
                document.getElementById('size-display').style.color = color;
                
                const audio = sounds[sizeKey];
                audio.currentTime = 0;
                audio.play().catch(e => {
                    document.getElementById('audio-debug').innerText = "再生ブロック";
                });
            }
        }

        document.getElementById('tareBtn').onclick = () => {
            stableWeight = currentWeight;
            document.getElementById('size-display').innerText = "基準リセット";
            document.getElementById('diff-display').innerText = "--.- g 減";
        };
    </script>
</body>
</html>
