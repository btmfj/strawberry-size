<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>イチゴ選別システム V1.01</title>
    <style>
        /* 背景を黒にして更新されたか判別しやすくします */
        body { background-color: black !important; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        #weight { font-size: 80px; font-weight: bold; color: #ff4757; margin: 20px 0; border: 2px solid #444; padding: 10px; border-radius: 10px; }
        
        /* ボタンを大きく、絶対に見えるように設定 */
        .my-button { 
            display: block !important; 
            width: 90%; 
            max-width: 400px;
            height: 80px; 
            margin: 15px auto; 
            font-size: 24px;
            font-weight: bold;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            color: white;
        }
        #connectBtn { background-color: #28a745 !important; } /* 緑 */
        #tareBtn { background-color: #ff8c00 !important; }   /* オレンジ */
        
        button:active { transform: translateY(2px); opacity: 0.8; }
    </style>
</head>
<body>
    <h1>イチゴ選別システム V1.01</h1>
    
    <div id="weight">0.0<span> g</span></div>
    
    <button id="connectBtn" class="my-button">1. 接続する</button>
    <button id="tareBtn" class="my-button">2. 0gセット（風袋引き）</button>

    <p id="status" style="color: #aaa;">画面が黒ければ最新版です</p>

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
        let bluetoothChar = null;
        let lastAnnouncedWeight = 0;

        document.getElementById('connectBtn').onclick = async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'ESP32_Strawberry_Scale' }],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bluetoothChar = await service.getCharacteristic(CHARACTERISTIC_UUID);
                
                document.getElementById('status').innerText = "✅ 接続完了";
                alert("接続しました！");
                
                bluetoothChar.startNotifications();
                bluetoothChar.oncharacteristicvaluechanged = (e) => {
                    const val = new TextDecoder().decode(e.target.value);
                    const weight = parseFloat(val);
                    document.getElementById('weight').innerHTML = `${weight.toFixed(1)}<span> g</span>`;
                    
                    // 読み上げ処理
                    if (weight > 10 && Math.abs(weight - lastAnnouncedWeight) > 5) {
                        announce(weight);
                        lastAnnouncedWeight = weight;
                    } else if (weight < 3) {
                        lastAnnouncedWeight = 0;
                    }
                };
            } catch (err) { 
                alert("接続エラー: " + err); 
            }
        };

        document.getElementById('tareBtn').onclick = async () => {
            if (bluetoothChar) {
                try {
                    const data = new Uint8Array([0x31]); // '1'を送信
                    await bluetoothChar.writeValue(data);
                } catch (err) {
                    alert("送信失敗: " + err);
                }
            } else {
                alert("先に「1. 接続する」を押してください");
            }
        };

        function announce(w) {
            let rounded = Math.round(w);
            let size = "";
            if (rounded >= 28) size = "、特大です";
            else if (rounded >= 20) size = "、Lサイズです";
            else if (rounded >= 15) size = "、Mサイズです";

            const msg = new SpeechSynthesisUtterance(`${rounded}グラム${size}`);
            msg.lang = "ja-JP";
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
