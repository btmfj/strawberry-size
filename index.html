<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イチゴ選別システム V1.28</title>
    <style>
        body { background-color: #000; color: #fff; text-align: center; font-family: sans-serif; padding: 10px; overflow: hidden; }
        #status { color: #888; font-size: 14px; margin-bottom: 5px; }
        #weight { font-size: 80px; font-weight: bold; color: #00ff00; margin: 5px 0; }
        #weight span { font-size: 24px; }
        #diff-display { font-size: 30px; color: #ff4757; height: 35px; }
        
        #flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; align-items: center; justify-content: center;
            z-index: 100; font-size: 180px; font-weight: bold; color: #fff;
        }

        .btn-container { position: relative; z-index: 10; }
        .my-button { width: 95%; max-width: 400px; height: 85px; font-size: 24px; font-weight: bold; border-radius: 20px; border: none; color: white; margin: 10px 0; }
        #connectBtn { background-color: #28a745; }
        #tareBtn { background-color: #ff8c00; }
    </style>
</head>
<body>
    <div id="flash-overlay"></div>

    <div id="status">Bluetooth未接続</div>
    <div id="weight">0.0<span>g</span></div>
    <div id="diff-display">--.- g 減</div>
    
    <div class="btn-container">
        <button id="connectBtn" class="my-button">① 接続・開始</button>
        <button id="tareBtn" class="my-button">② 基準リセット</button>
    </div>

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
        
        const sounds = {};
        const fileNames = ["2l", "l", "m", "s", "start"];
        
        // 音声の事前読み込みのみ行う（再生はしない）
        fileNames.forEach(name => {
            const key = name.toUpperCase();
            sounds[key] = new Audio("./" + name + ".mp3");
            sounds[key].load();
        });

        let bluetoothChar = null;
        let currentWeight = 0;
        let stableWeight = 0;
        let weightHistory = [];

        document.getElementById('connectBtn').onclick = async () => {
            try {
                // --- ★修正：一括再生をやめ、個別に「準備完了」状態にする ---
                // この操作だけで、以降のスクリプトからの play() が許可されます
                sounds["START"].play(); // start.mp3 だけを鳴らす

                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'ESP32_Strawberry_Scale' }],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bluetoothChar = await service.getCharacteristic(CHARACTERISTIC_UUID);
                await bluetoothChar.startNotifications();
                
                document.getElementById('status').innerText = "✅ 接続中";

                bluetoothChar.addEventListener('characteristicvaluechanged', (e) => {
                    const val = new TextDecoder().decode(e.target.value);
                    processWeight(parseFloat(val));
                });
            } catch (err) { alert("エラー: " + err); }
        };

        function processWeight(w) {
            currentWeight = w;
            document.getElementById('weight').innerHTML = `${w.toFixed(1)}<span>g</span>`;

            weightHistory.push(w);
            if (weightHistory.length > 3) weightHistory.shift();

            if (weightHistory.length === 3) {
                const maxW = Math.max(...weightHistory);
                const minW = Math.min(...weightHistory);
                if (maxW - minW < 0.2) {
                    if (Math.abs(stableWeight - w) > 0.5) { 
                        if (stableWeight > w) checkDifference(stableWeight, w);
                        stableWeight = w;
                    }
                }
            }
        }

        function checkDifference(oldW, newW) {
            const diff = oldW - newW;
            if (diff < 5.0) return;

            document.getElementById('diff-display').innerText = diff.toFixed(1) + " g 減";
            
            let sizeKey = "";
            let bgColor = "";

            // S/Lは青、M/2Lは赤
            if (diff >= 15.5) { sizeKey = "2L"; bgColor = "#ff0000"; }
            else if (diff >= 12.0) { sizeKey = "L"; bgColor = "#0000ff"; }
            else if (diff >= 10.0) { sizeKey = "M"; bgColor = "#ff0000"; }
            else if (diff >= 7.0)  { sizeKey = "S"; bgColor = "#0000ff"; }

            if (sizeKey) {
                showFlash(sizeKey, bgColor);
                // 再生直前に load() を挟まないことで遅延を防ぐ
                const audio = sounds[sizeKey];
                audio.currentTime = 0;
                audio.play().catch(e => {
                    // もし再生がブロックされたらここで再読み込みを試みる
                    audio.load();
                    audio.play();
                });
            }
        }

        function showFlash(text, color) {
            const overlay = document.getElementById('flash-overlay');
            overlay.innerText = text;
            overlay.style.backgroundColor = color;
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.display = 'none'; }, 1000);
        }

        document.getElementById('tareBtn').onclick = () => {
            stableWeight = currentWeight;
            document.getElementById('diff-display').innerText = "基準リセット完了";
        };
    </script>
</body>
</html>
