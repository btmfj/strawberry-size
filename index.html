<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イチゴ選別くん 0.1g</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #fff5f5; padding: 20px; }
        #weight { font-size: 100px; font-weight: bold; color: #ff4757; margin: 20px 0; }
        .btn-container { display: flex; justify-content: center; gap: 10px; }
        button { font-size: 20px; padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; color: white; }
        #connectBtn { background: #2ed573; }
        #tareBtn { background: #ffa502; display: none; } /* 接続されるまで隠す */
    </style>
</head>
<body>
    <h1>イチゴ選別システム</h1>
    <div id="weight">0.0<span> g</span></div>
    <div class="btn-container">
        <button id="connectBtn">計測開始（接続）</button>
        <button id="tareBtn">0gセット（風袋引き）</button>
    </div>

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
        let bluetoothChar = null;

        document.getElementById('connectBtn').onclick = async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'ESP32_Strawberry_Scale' }],
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                bluetoothChar = await service.getCharacteristic(CHARACTERISTIC_UUID);

                document.getElementById('tareBtn').style.display = "block";
                bluetoothChar.startNotifications();
                bluetoothChar.oncharacteristicvaluechanged = (e) => {
                    const val = new TextDecoder().decode(e.target.value);
                    document.getElementById('weight').innerHTML = `${parseFloat(val).toFixed(1)}<span> g</span>`;
                };
            } catch (err) { alert(err); }
        };

        // 風袋引きボタンの処理
        document.getElementById('tareBtn').onclick = async () => {
            if (bluetoothChar) {
                const data = new Uint8Array([0x31]); // 文字列 '1' を送信
                await bluetoothChar.writeValue(data);
            }
        };
    </script>
</body>
</html>
